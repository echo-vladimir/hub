name: CMS CI
on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: Base branch for diff
        required: true
        default: main
        type: string

concurrency:
  group: cms-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scope:
    name: CMS Scope
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.actor == github.repository_owner
    outputs:
      cms_only: ${{ steps.classify.outputs.cms_only }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Classify Changes
        id: classify
        shell: bash
        run: |
          base_ref="${{ github.event.inputs.base_ref || 'main' }}"
          app=false
          cms=false

          git fetch --no-tags --depth=1 origin "$base_ref"

          if ! git rev-parse --verify --quiet "origin/$base_ref" >/dev/null; then
            echo "Missing origin/$base_ref"
            exit 1
          fi

          while IFS= read -r path; do
            [[ -z "$path" ]] && continue

            if [[ "$path" == content/* || "$path" == public/media/* ]]; then
              cms=true
            else
              app=true
            fi
          done < <(git diff --name-only "origin/$base_ref...HEAD" --)

          cms_only=false
          if [[ "$cms" == "true" && "$app" != "true" ]]; then
            cms_only=true
          fi

          echo "cms_only=$cms_only" >> "$GITHUB_OUTPUT"

      - name: Note Scope Result
        if: ${{ steps.classify.outputs.cms_only != 'true' }}
        run: echo "No CMS-only changes detected."

  verify:
    name: CMS Verify
    needs: scope
    if: ${{ needs.scope.result == 'success' && needs.scope.outputs.cms_only == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      KEYSTATIC_GITHUB_CLIENT_ID: ${{ secrets.KEYSTATIC_GITHUB_CLIENT_ID }}
      KEYSTATIC_GITHUB_CLIENT_SECRET: ${{ secrets.KEYSTATIC_GITHUB_CLIENT_SECRET }}
      KEYSTATIC_SECRET: ${{ secrets.KEYSTATIC_SECRET }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.17.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build Application
        run: pnpm run build
