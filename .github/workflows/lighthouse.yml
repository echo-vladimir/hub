name: Lighthouse
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
    branches: [main]

concurrency:
  group: lighthouse-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !github.event.pull_request.draft &&
            (github.event.pull_request.user.login == 'echo-vladimir' || github.event.pull_request.user.type == 'Bot') &&
            github.event.pull_request.head.repo.full_name == github.repository &&
            (
              (github.event.action == 'labeled' && github.event.label.name == 'perf') ||
              (github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'perf'))
            ) }}
    permissions:
      contents: read
    env:
      KEYSTATIC_GITHUB_CLIENT_ID: ${{ secrets.KEYSTATIC_GITHUB_CLIENT_ID }}
      KEYSTATIC_GITHUB_CLIENT_SECRET: ${{ secrets.KEYSTATIC_GITHUB_CLIENT_SECRET }}
      KEYSTATIC_SECRET: ${{ secrets.KEYSTATIC_SECRET }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Detect Changes
        id: changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            app:
              - '**/*'
              - '!content/**'
              - '!public/media/**'

      - name: Setup pnpm
        if: ${{ steps.changes.outputs.app == 'true' }}
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.17.1
          run_install: false

      - name: Setup Node.js
        if: ${{ steps.changes.outputs.app == 'true' }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        if: ${{ steps.changes.outputs.app == 'true' }}
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build Application
        if: ${{ steps.changes.outputs.app == 'true' }}
        run: pnpm run build

      - name: Run Lighthouse Audit
        if: ${{ steps.changes.outputs.app == 'true' }}
        uses: treosh/lighthouse-ci-action@fcd65974f7c4c2bf0ee9d09b84d2489183c29726 # v12.6.1
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
