version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Warsaw
    open-pull-requests-limit: 1
    rebase-strategy: disabled
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    assignees: [echo-vladimir]
    reviewers: [echo-vladimir]
    labels: [dependencies, github actions]
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]
      actions-security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Europe/Warsaw
    open-pull-requests-limit: 1
    rebase-strategy: disabled
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    versioning-strategy: increase-if-necessary
    commit-message: { prefix: deps, include: scope }
    assignees: [echo-vladimir]
    reviewers: [echo-vladimir]
    labels: [dependencies]
    groups:
      npm-runtime-minor-patch:
        dependency-type: production
        patterns: ["*"]
        update-types: [minor, patch]
      npm-dev-minor-patch:
        dependency-type: development
        patterns: ["*"]
        update-types: [minor, patch]
      npm-security:
        applies-to: security-updates
        patterns: ["*"]
    allow:
      - dependency-type: direct
    ignore:
      - dependency-name: "*"
        update-types: [version-update:semver-major]
