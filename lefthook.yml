pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,cjs,mjs,cts,mts,jsx,tsx,json,jsonc}"
      stage_fixed: true
      run: pnpm -s biome check --write {staged_files}
    types:
      run: pnpm -s typecheck

commit-msg:
  commands:
    commitlint:
      run: pnpm -s commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    types:
      run: pnpm -s run typecheck
    # tests:
    #   run: pnpm -s test